version: "3.8"

services:
  bobopic:
    image: ghcr.io/trinculoliang/bobopic:main
    container_name: bobopic
    restart: unless-stopped
    # 威联通需要显式指定用户权限
    user: "1000:100"
    volumes:
      # 使用绝对路径，确保正确挂载
      - type: bind
        source: /share/ZFS23_DATA/Container/bobopic/in
        target: /data/input
        bind:
          propagation: rslave
      - type: bind
        source: /share/ZFS23_DATA/Container/bobopic/out
        target: /data/output
        bind:
          propagation: rslave
      - type: bind
        source: /share/ZFS23_DATA/Container/bobopic/bak
        target: /data/backup
        bind:
          propagation: rslave
    environment:
      DRY_RUN: "true"
      INPUT_FOLDER: "/data/input"
      OUTPUT_FOLDER: "/data/output"
      BACKUP_FOLDER: "/data/backup"
    command: preview
