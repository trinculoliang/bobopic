version: "3.8"

services:
  bobopic:
    image: ghcr.io/trinculoliang/bobopic:main
    container_name: bobopic
    restart: unless-stopped
    user: "1000:100"
    
    volumes:
      # 输入目录：NAS 照片源文件
      - type: bind
        source: /share/ZFS23_DATA/Container/bobopic/in
        target: /data/input
        bind:
          propagation: rslave
      
      # 输出目录：整理后的照片归档
      - type: bind
        source: /share/ZFS23_DATA/Container/bobopic/out
        target: /data/output
        bind:
          propagation: rslave
      
      # 备份目录：重命名前的原文件备份
      - type: bind
        source: /share/ZFS23_DATA/Container/bobopic/bak
        target: /data/backup
        bind:
          propagation: rslave
    
    # 只保留路径配置，模式由 command 控制
    environment:
      INPUT_FOLDER: "/data/input"
      OUTPUT_FOLDER: "/data/output"
      BACKUP_FOLDER: "/data/backup"
    
    # 命令控制执行模式：preview=预览，organize=实际执行
    command: preview
