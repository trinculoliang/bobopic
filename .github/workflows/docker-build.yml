name: Build and Push Docker Image

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2           # 升级：v4.1.1 → v4.2.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.6.0   # 升级：v3.0.0 → v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0 # 升级：v3.0.0 → v3.10.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3.4.0         # 升级：v3.0.0 → v3.4.0

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5.7.0      # 升级：v5.5.1 → v5.7.0

      - name: Build and push
        uses: docker/build-push-action@v6.15.0   # 升级：v5.1.0 → v6.15.0
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
